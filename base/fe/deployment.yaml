apiVersion: apps/v1
kind: Deployment
metadata:
  name: scg-frontend
spec:
  replicas: 1 
  selector:
    matchLabels:
      app: scg-frontend
  template:
    metadata:
      labels:
        app: scg-frontend
    spec:
      containers:
      - name: frontend-container
        image: scgskku/scg-home-fe-prod
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
        env:
        - name: NODE_ENV
          value: "production"
---
apiVersion: v1
kind: Service
metadata:
  name: scg-frontend-svc
spec:
  selector:
    app: scg-frontend
  ports:
  - protocol: TCP
    port: 8000     
    targetPort: 3000 
  type: NodePort 