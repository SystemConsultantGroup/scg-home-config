apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: scg-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
  - http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: scg-frontend-svc
            port:
              number: 8000

      - path: /api/v2
        pathType: Prefix
        backend:
          service:
            name: scg-be-v2-svc
            port:
              number: 9002