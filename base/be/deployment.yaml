apiVersion: apps/v1
kind: Deployment
metadata:
  name: scg-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: scg-be
  template:
    metadata:
      labels:
        app: scg-be
    spec:
      containers:
      - name: be-v2-container
        image: scg-be-v2:2
        imagePullPolicy: Never
        ports:
        - containerPort: 8000
        env:
        - name: NODE_ENV
          value: "production"
        - name: TZ
          value: "Asia/Seoul"
---
apiVersion: v1
kind: Service
metadata:
  name: scg-be
spec:
  selector:
    app: scg-be
  ports:
  - protocol: TCP
    port: 9002
    targetPort: 8000
  type: NodePort