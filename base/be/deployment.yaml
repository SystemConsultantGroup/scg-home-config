apiVersion: apps/v1
kind: Deployment
metadata:
  name: scg-backend-v2
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: scg-be
  template:
    metadata:
      labels:
        app: scg-be
    spec:
      containers:
      - name: be-v2-container
        image: scgskku/scg-home-be-prod
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
        env:
        - name: NODE_ENV
          value: "production"
        - name: TZ
          value: "Asia/Seoul"